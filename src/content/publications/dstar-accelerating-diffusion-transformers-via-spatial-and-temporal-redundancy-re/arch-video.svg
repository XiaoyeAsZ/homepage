<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" role="img" aria-labelledby="title desc">
  <title id="title">DSTAR architecture video placeholder</title>
  <desc id="desc">Animated placeholder for a future DSTAR architecture video.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8f6"/>
      <stop offset="1" stop-color="#f7ead8"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#c8161e"/>
      <stop offset="1" stop-color="#8f141b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5c1518" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3">
      <path d="M0,0 L0,6 L9,3 z" fill="#8f141b"/>
    </marker>
  </defs>
  <rect width="920" height="480" rx="28" fill="url(#bg)"/>
  <text x="460" y="58" fill="#5c1518" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Architecture Video Placeholder</text>
  <g filter="url(#shadow)">
    <rect x="70" y="120" width="180" height="96" rx="14" fill="#ffffff" stroke="#e3c8bf"/>
    <text x="160" y="158" fill="#5c1518" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">DiT Blocks</text>
    <text x="160" y="184" fill="#7d6d66" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">latent tokens</text>
    <rect x="340" y="108" width="240" height="120" rx="16" fill="#ffffff" stroke="#c8161e" stroke-width="3"/>
    <text x="460" y="150" fill="#5c1518" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Redundancy Analyzer</text>
    <text x="460" y="178" fill="#7d6d66" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">spatial + temporal decisions</text>
    <rect x="670" y="120" width="180" height="96" rx="14" fill="#ffffff" stroke="#e3c8bf"/>
    <text x="760" y="158" fill="#5c1518" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Execution Engine</text>
    <text x="760" y="184" fill="#7d6d66" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">skip / reuse / compute</text>
    <rect x="190" y="300" width="220" height="90" rx="14" fill="#fffdfb" stroke="#d7b2a7"/>
    <text x="300" y="338" fill="#5c1518" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Feature Cache</text>
    <text x="300" y="362" fill="#7d6d66" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">reused activations</text>
    <rect x="510" y="300" width="220" height="90" rx="14" fill="#fffdfb" stroke="#d7b2a7"/>
    <text x="620" y="338" fill="#5c1518" font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Scheduler</text>
    <text x="620" y="362" fill="#7d6d66" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">step-aware dispatch</text>
  </g>
  <path d="M250 168 H326" fill="none" stroke="#8f141b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 168 H656" fill="none" stroke="#8f141b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M460 228 V274" fill="none" stroke="#c8a45d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M410 345 H494" fill="none" stroke="#c8a45d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 300 C650 250 700 225 760 216" fill="none" stroke="#8f141b" stroke-width="4" marker-end="url(#arrow)"/>
  <circle r="9" fill="#c8161e">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M250 168 H326 M460 228 V274 M410 345 H494 M620 300 C650 250 700 225 760 216"/>
  </circle>
  <g transform="translate(460 238)">
    <circle r="42" fill="#c8161e" opacity="0.92">
      <animate attributeName="r" values="40;46;40" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.92;0.72;0.92" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M-10 -18 L24 0 L-10 18 Z" fill="#ffffff"/>
  </g>
  <rect x="72" y="412" width="776" height="28" rx="14" fill="url(#red)" opacity="0.16"/>
  <text x="460" y="432" fill="#5c1518" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Animated SVG placeholder; replace with final architecture video when available</text>
</svg>
